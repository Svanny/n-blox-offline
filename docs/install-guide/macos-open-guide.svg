<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960">
  <rect width="1440" height="960" fill="#061018"/>
  <text x="72" y="92" fill="#e8f6ff" font-family="Arial, sans-serif" font-size="48" font-weight="700">macOS offline app guide</text>
  <text x="72" y="134" fill="#9eb3c2" font-family="Arial, sans-serif" font-size="24">Use this only for the GitHub release zip. Do not disable Gatekeeper globally.</text>
  <g transform="translate(72 190)">
    <rect width="396" height="260" rx="18" fill="#0d1c28" stroke="#203847" stroke-width="2"/>
    <text x="28" y="48" fill="#fff15c" font-family="Arial, sans-serif" font-size="24" font-weight="700">1. Download and unzip</text>
    <rect x="42" y="82" width="312" height="112" rx="10" fill="#132b3a"/>
    <text x="70" y="128" fill="#e8f6ff" font-family="Arial, sans-serif" font-size="22">GitHub Release</text>
    <text x="70" y="162" fill="#9eb3c2" font-family="Arial, sans-serif" font-size="18">tetris-nblox...mac-x64.zip</text>
    <path d="M196 220 l24 -28 h-14 v-42 h-20 v42 h-14z" fill="#42d6ff"/>
  </g>
  <g transform="translate(522 190)">
    <rect width="396" height="260" rx="18" fill="#0d1c28" stroke="#203847" stroke-width="2"/>
    <text x="28" y="48" fill="#fff15c" font-family="Arial, sans-serif" font-size="24" font-weight="700">2. Right-click the app</text>
    <rect x="58" y="84" width="120" height="120" rx="28" fill="#102e45" stroke="#42d6ff" stroke-width="3"/>
    <text x="88" y="153" fill="#e8f6ff" font-family="Arial, sans-serif" font-size="46" font-weight="700">T</text>
    <rect x="206" y="98" width="142" height="92" rx="8" fill="#f5f5f7"/>
    <text x="226" y="132" fill="#111827" font-family="Arial, sans-serif" font-size="18">Open</text>
    <text x="226" y="164" fill="#111827" font-family="Arial, sans-serif" font-size="18">Show Info</text>
  </g>
  <g transform="translate(972 190)">
    <rect width="396" height="260" rx="18" fill="#0d1c28" stroke="#203847" stroke-width="2"/>
    <text x="28" y="48" fill="#fff15c" font-family="Arial, sans-serif" font-size="24" font-weight="700">3. Click Open again</text>
    <rect x="46" y="84" width="304" height="130" rx="18" fill="#f5f5f7"/>
    <text x="70" y="122" fill="#111827" font-family="Arial, sans-serif" font-size="18" font-weight="700">macOS cannot verify...</text>
    <text x="70" y="154" fill="#374151" font-family="Arial, sans-serif" font-size="15">Only continue if the checksum matches.</text>
    <rect x="232" y="172" width="78" height="28" rx="14" fill="#007aff"/>
    <text x="251" y="192" fill="#fff" font-family="Arial, sans-serif" font-size="15" font-weight="700">Open</text>
  </g>
  <g transform="translate(72 530)">
    <rect width="616" height="252" rx="18" fill="#21170d" stroke="#ffb36b" stroke-width="2"/>
    <text x="28" y="50" fill="#ffb36b" font-family="Arial, sans-serif" font-size="26" font-weight="700">If macOS still blocks it</text>
    <text x="28" y="92" fill="#e8f6ff" font-family="Arial, sans-serif" font-size="22">System Settings &gt; Privacy &amp; Security</text>
    <text x="28" y="132" fill="#9eb3c2" font-family="Arial, sans-serif" font-size="19">Apple shows "Open Anyway" for about an hour</text>
    <text x="28" y="160" fill="#9eb3c2" font-family="Arial, sans-serif" font-size="19">after the first blocked launch.</text>
    <rect x="28" y="166" width="170" height="42" rx="21" fill="#ffb36b"/>
    <text x="58" y="194" fill="#061018" font-family="Arial, sans-serif" font-size="18" font-weight="700">Open Anyway</text>
  </g>
  <g transform="translate(752 530)">
    <rect width="616" height="252" rx="18" fill="#0d1c28" stroke="#203847" stroke-width="2"/>
    <text x="28" y="50" fill="#42d6ff" font-family="Arial, sans-serif" font-size="26" font-weight="700">Before opening</text>
    <text x="28" y="92" fill="#e8f6ff" font-family="Arial, sans-serif" font-size="22">Check the SHA-256 checksum in the README.</text>
    <text x="28" y="132" fill="#9eb3c2" font-family="Arial, sans-serif" font-size="19">Only trust the official GitHub release. Delete copies from unknown sites.</text>
  </g>
</svg>
